name: MOCO API PR Agent

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: true
      dry_run:
        description: "Validate and plan without opening a PR"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'moco-api-update') ||
      github.event.label.name == 'moco-api-update' ||
      github.event.label.name == 'flue:auto-pr-ready'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run MOCO API PR agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          npm run flue:moco-api-pr -- --payload '{"issueNumber":${{ github.event.issue.number || github.event.inputs.issue_number }},"dryRun":${{ github.event.inputs.dry_run || 'false' }}}'
